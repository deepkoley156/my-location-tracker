<!DOCTYPE html>
<html>
<head>
    <title>Where is Pradip?</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>#map { height: 500px; width: 100%; }</style>
</head>
<body>
    <h1>Megha, Pradip is here:</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([22.57, 88.36], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const marker = L.marker([22.57, 88.36]).addTo(map);

        // প্রতি ৫ সেকেন্ডে সার্ভার থেকে লোকেশন চেক করবে
        setInterval(async () => {
            const res = await fetch('/get-location');
            const data = await res.json();
            if(data.lat && data.lng) {
                marker.setLatLng([data.lat, data.lng]);
                map.setView([data.lat, data.lng], 15);
            }
        }, 5000);
    </script>
</body>
</html>
