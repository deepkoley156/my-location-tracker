<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megha's Tracker & Bot ❤️</title>
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts for a Clean Look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* Clean and Minimalist Design */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #f4f4f9;
        }

        /* Full Screen Map */
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }

        /* Chat Toggle Button */
        .chat-toggle-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background-color: #ff4d6d;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.4);
            z-index: 1000;
            border: none;
            transition: 0.3s;
        }
        .chat-toggle-btn:hover {
            background-color: #ff3355;
            transform: scale(1.05);
        }

        /* Chatbox Container */
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 25px;
            width: 320px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: none; /* Hidden by default */
            flex-direction: column;
            overflow: hidden;
        }

        /* Chat Header */
        .chat-header {
            background: #ff4d6d;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
        }

        /* Chat Messages Area */
        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Individual Message Bubbles */
        .message {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }
        .bot-msg {
            background: #ffe6ea;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .user-msg {
            background: #ff4d6d;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        /* Input Area */
        .chat-input-area {
            display: flex;
            border-top: 1px solid #eee;
            background: white;
        }
        .chat-input-area input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }
        .chat-input-area button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 0 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .chat-input-area button:hover {
            background: #ff3355;
        }
    </style>
</head>
<body>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Chat Toggle Button -->
    <button class="chat-toggle-btn" onclick="toggleChat()">💬</button>

    <!-- Chatbox -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">Megha's Special Bot ❤️</div>
        
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome Message -->
            <div class="message bot-msg">
                কেমন আছো, মেঘা? প্রদীপের লাইভ লোকেশন ম্যাপে দেখতে পাচ্ছো। কিছু বলার থাকলে আমাকে জানাতে পারো! ❤️
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="এখানে লেখো..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Leaflet JS for Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ==========================
        // 1. MAP & LOCATION SETUP
        // ==========================
        const map = L.map('map').setView([22.5726, 88.3639], 13); // Default (Kolkata)
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userMarker = null;

        // Fetch Location from Server
        async function fetchLocation() {
            try {
                // এখানে সঠিক রিলেটিভ URL ব্যবহার করা হয়েছে
                const response = await fetch('/get-location'); 
                const data = await response.json();

                if (data.lat && data.lng) {
                    if (!userMarker) {
                        // Create marker if it doesn't exist
                        userMarker = L.marker([data.lat, data.lng]).addTo(map);
                        map.setView([data.lat, data.lng], 16);
                    } else {
                        // Update marker position
                        userMarker.setLatLng([data.lat, data.lng]);
                    }
                }
            } catch (error) {
                console.error("Location fetch error:", error);
            }
        }

        // Update location every 5 seconds
        setInterval(fetchLocation, 5000);
        fetchLocation(); // First call immediately

        // ==========================
        // 2. CHATBOT SETUP
        // ==========================
        function toggleChat() {
            const chatBox = document.getElementById('chatContainer');
            if (chatBox.style.display === 'none' || chatBox.style.display === '') {
                chatBox.style.display = 'flex';
            } else {
                chatBox.style.display = 'none';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const messageText = inputField.value.trim();

            if (messageText === "") return;

            // Show user message in UI
            appendMessage(messageText, 'user-msg');
            inputField.value = ''; // Clear input

            try {
                // এখানে সঠিক রিলেটিভ URL ব্যবহার করা হয়েছে
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message: messageText })
                });

                const data = await response.json();
                
                // Show bot reply in UI
                if (data.reply) {
                    appendMessage(data.reply, 'bot-msg');
                }
            } catch (error) {
                appendMessage("একটু সমস্যা হচ্ছে, পরে আবার চেষ্টা করো ❤️", 'bot-msg');
                console.error("Chat fetch error:", error);
            }
        }

        function appendMessage(text, className) {
            const messageContainer = document.getElementById('chatMessages');
            const newMessage = document.createElement('div');
            newMessage.className = `message ${className}`;
            newMessage.innerText = text;
            
            messageContainer.appendChild(newMessage);
            // Auto scroll to bottom
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }
    </script>
</body>
</html>
