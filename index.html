<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রদীপের লোকেশন</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Minimalist Chat Window */
        #chat-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-header {
            background: #f1f1f1;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #ddd;
        }
        #chat-box {
            height: 300px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 14px;
        }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; line-height: 1.4; }
        .msg.megha { background: #e0f7fa; color: #006064; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.ai { background: #f5f5f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
            background: #fff;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        #send-btn {
            background: none;
            border: none;
            color: #00796b;
            font-weight: bold;
            padding: 0 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="chat-container">
        <div id="chat-header">একটু কথা বলি?</div>
        <div id="chat-box">
            <div class="msg ai">কেমন আছো, মেঘা? ❤️</div>
        </div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="এখানে লেখো..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Map Initialization
        const map = L.map('map').setView([22.5726, 88.3639], 13); // Default Kolkata
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const marker = L.marker([22.5726, 88.3639]).addTo(map)
            .bindPopup("প্রদীপ এখানে আছে")
            .openPopup();

        // Location Update Logic
        setInterval(() => {
            fetch('/location')
                .then(res => res.json())
                .then(data => {
                    if (data.lat !== 0 && data.lng !== 0) {
                        const newLatLng = new L.LatLng(data.lat, data.lng);
                        marker.setLatLng(newLatLng);
                        map.setView(newLatLng);
                    }
                });
        }, 5000);

        // Chatbot Logic
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // Show Megha's message
            const meghaDiv = document.createElement('div');
            meghaDiv.className = 'msg megha';
            meghaDiv.innerText = text;
            chatBox.appendChild(meghaDiv);
            messageInput.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Fetch AI reply
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();

                // Show AI message
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg ai';
                aiDiv.innerText = data.reply;
                chatBox.appendChild(aiDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                console.error("Chat Error:", error);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Fix for map size rendering
        setTimeout(() => { map.invalidateSize(); }, 500);
    </script>
</body>
</html>
