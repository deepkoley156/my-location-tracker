<!DOCTYPE html>
<html>
<head>
    <title>Megha's Tracker - Live</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // একদম আসল গুগল ম্যাপের লেয়ার
        // স্ট্রিট ভিউ (রাস্তাঘাট)
        const googleStreet = L.tileLayer('http://mt0.google.com/vt/lyrs=m&hl=en&x={x}&y={y}&z={z}', { 
            attribution: '© Google', maxZoom: 21 
        });
        
        // হাইব্রিড ভিউ (স্যাটেলাইট + রাস্তার নাম ও লেবেল)
        const googleSatellite = L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', { 
            attribution: '© Google', maxZoom: 21 
        });

        // ম্যাপ খুললেই প্রথমে গুগল স্যাটেলাইট (নামসহ) দেখাবে
        const map = L.map('map', {
            layers: [googleSatellite] 
        }).setView([22.5726, 88.3639], 16); // 16 মানে একটু বেশি জুম হয়ে থাকবে

        // লেয়ার চেঞ্জ করার বাটন
        L.control.layers({ "Google Street": googleStreet, "Google Satellite": googleSatellite }).addTo(map);

        const marker = L.marker([22.5726, 88.3639]).addTo(map);

        // লোকেশন আপডেট করার ফাংশন
        async function fetchLocation() {
            try {
                const response = await fetch('/get-location');
                const data = await response.json();
                if(data.lat && data.lng) {
                    const newLatLng = new L.LatLng(data.lat, data.lng);
                    marker.setLatLng(newLatLng);
                    map.panTo(newLatLng);
                }
            } catch (error) { console.error("Error:", error); }
        }

        // প্রতি ৫ সেকেন্ডে লাইভ আপডেট
        setInterval(fetchLocation, 5000);
    </script>
</body>
</html>
