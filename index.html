<!DOCTYPE html>
<html>
<head>
    <title>Megha's Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; display: none; } /* শুরুতে ম্যাপ লুকানো */
        #status-overlay { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #fff; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 2000;
            font-size: 18px; color: #555;
        }
        #last-update { 
            position: fixed; top: 10px; right: 10px; z-index: 1000; 
            background: rgba(255,255,255,0.8); padding: 5px 10px; border-radius: 5px; 
            font-size: 12px; display: none;
        }
    </style>
</head>
<body>

    <div id="status-overlay">
        <div style="font-size: 50px;">📡</div>
        <p>Finding your location...</p>
    </div>

    <div id="last-update">Last update: --</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([22.5726, 88.3639], 15);
        L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', { maxZoom: 21 }).addTo(map);
        const marker = L.marker([22.5726, 88.3639]).addTo(map);
        
        let firstLoad = true;

        async function fetchLocation() {
            try {
                const response = await fetch('/get-location');
                const data = await response.json();
                
                if(data.lat && data.lng) {
                    const newLatLng = new L.LatLng(data.lat, data.lng);
                    marker.setLatLng(newLatLng);
                    
                    if(firstLoad) {
                        map.setView(newLatLng, 17);
                        document.getElementById('status-overlay').style.display = 'none';
                        document.getElementById('map').style.display = 'block';
                        document.getElementById('last-update').style.display = 'block';
                        firstLoad = false;
                    }
                    
                    document.getElementById('last-update').innerText = "Last update: " + new Date().toLocaleTimeString();
                }
            } catch (error) { console.error("Waiting for data..."); }
        }
        
        // ৫ সেকেন্ড পর পর চেক করবে
        setInterval(fetchLocation, 5000);
        fetchLocation();
    </script>
</body>
</html>
